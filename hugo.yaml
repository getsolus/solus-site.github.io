baseURL: "https://getsol.us/"
languageCode: "en-us"
title: "Solus"

build:
  buildStats:
    enable: true
  cachebusters:
    - source: assets/notwatching/hugo_stats\.json
      target: css
    - source: (postcss|tailwind)\.config\.js
      target: css

module:
  imports:
    - path: "github.com/imfing/hextra"
  mounts:
    - source: assets
      target: assets
    - disableWatch: true
      source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json

markup:
  goldmark:
    renderer:
      unsafe: true

enableInlineShortcodes: true

menus:
  main:
    - identifier: download
      name: Download
      pageRef: /download
      weight: 1
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 2
    - identifier: about
      name: About
      weight: 3
    - identifier: community
      name: Community
      weight: 4
    - identifier: help
      name: Help ↗
      url: "https://help.getsol.us"
      weight: 5
    - identifier: donate
      name: Donate ↗
      url: "https://opencollective.com/getsolus"
      weight: 6
    - identifier: search
      name: Search
      weight: 7
      params:
        type: search
    - identifier: github
      name: Github ↗
      url: "https://github.com/getsolus/"
      weight: 8
      params:
        icon: github
    - identifier: themetoggle
      name: Theme Toggle
      weight: 9
      params:
        type: theme-toggle
    - identifier: organization
      name: Organization
      pageRef: /about/organization
      parent: about
      weight: 1
    - identifier: team
      name: Team
      pageRef: /about/team
      parent: about
      weight: 2
    - identifier: forums
      name: Forums ↗
      url: "https://discuss.getsol.us"
      parent: community
      weight: 1
    - identifier: matrix
      name: Matrix ↗
      url: "https://matrix.to/#/#solus:matrix.org"
      parent: community
      weight: 2
    - identifier: mastodon
      name: Mastodon ↗
      url: https://floss.social/@getsolus
      parent: community
      weight: 3
    - identifier: bluesky
      name: Bluesky ↗
      url: https://bsky.app/profile/getsolus.bsky.social
      parent: community
      weight: 4

params:
  copyright: 2026
  externalLinkDecoration: true
  blog:
    list:
      displayTags: true
  toc:
    displayTags: true
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: imgs/Solus_With_Text.svg
      dark: imgs/Solus_With_Text_Dark.svg
      link: /
      height: 50
      width: 145
    width: wide
  footer:
    width: wide
    displayPoweredBy: false # We do this ourselves
    menu:
      - identifier: press
        name: Press
        pageRef: /press
      - identifier: branding
        name: Branding
        pageRef: /branding
      - identifier: security
        name: Security
        pageRef: /security
      - identifier: technology
        name: Technology
        pageRef: /technology
  search:
    enable: true
    type: flexsearch

    flexsearch:
      index: content
      tokenize: forward
  theme:
    default: system
    displayToggle: true
