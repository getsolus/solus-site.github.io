{{- $title := .Get "title" -}}
{{- $description := .Get "description" -}}

<div class="grid grid-cols-[60px_1fr] gap-6 pb-10 not-last:mb-10 not-last:border-b not-last:border-neutral-300/75 not-last:dark:border-neutral-200/75">
    <span class="text-5xl font-bold text-(--color-primary-500) opacity-30 leading-none">❖</span>
    <div>
        <h3 class="text-xl font-semibold mb-4">{{ $title }}</h3>
        <p class="text-lg text-neutral-500 leading-relaxed">{{ $description | markdownify }}</p>
    </div>
</div>
