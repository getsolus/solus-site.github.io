{{- $title := .Get "title" -}}
{{- $subtitle := .Get "subtitle" -}}

<div class="max-w-[90rem] mx-auto px-4 md:px-0">
    <section class="w-full py-10 md:py-12 lg:py-14 text-center">
        <h1 class="text-4xl md:text-5xl font-semibold leading-tight mx-auto mb-5">{{ $title }}</h1>

        {{- with $subtitle -}}
            <p class="text-lg md:text-xl italic text-neutral-500 dark:text-neutral-400 leading-relaxed max-w-2xl mx-auto">{{ $subtitle }}</p>
        {{- end -}}
    </section>
</div>
